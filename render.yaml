services:
  - type: web
    name: mzh-onyx
    env: node
    plan: free
    repo: https://github.com/sentrasec1/MZH-ONXY
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
